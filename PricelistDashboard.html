<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Enterprise Price Monitor</title>
    <style>
        :root {
            --primary: #2c3e50;
            --danger: #e74c3c;
            --warning: #f39c12;
            --bg: #f8f9fa;
            --border: #dcdde1;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }

        /* Dashboard Header & Search */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 15px 25px;
            border-radius: 8px 8px 0 0;
            border: 1px solid var(--border);
            border-bottom: none;
        }

        .search-box {
            padding: 8px 15px;
            width: 300px;
            border: 1px solid var(--border);
            border-radius: 4px;
        }

        /* Fixed Header Scroll Container */
        .table-container {
            background: white;
            border: 1px solid var(--border);
            border-radius: 0 0 8px 8px;
            height: 60vh; /* Limits height to prevent infinite scrolling */
            overflow-y: auto; /* Adds scrollbar */
            position: relative;
        }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; }

        /* Sticks the header to the top while scrolling */
        thead th {
            position: sticky;
            top: 0;
            background: #f1f2f6;
            z-index: 10;
            padding: 12px 20px;
            text-align: left;
            font-size: 0.85rem;
            border-bottom: 2px solid var(--border);
        }

        td { padding: 12px 20px; border-bottom: 1px solid #eee; font-size: 0.9rem; word-wrap: break-word; }

        /* Row Highlighting */
        .row-critical { border-left: 5px solid var(--danger); }
        .row-warning { border-left: 5px solid var(--warning); }

        /* Stats Summary */
        .stats-bar { display: flex; gap: 20px; margin-bottom: 15px; }
        .stat-pill {
            background: white;
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid var(--border);
            font-size: 0.85rem;
            font-weight: bold;
        }

        .badge { padding: 3px 8px; border-radius: 3px; font-size: 0.75rem; color: white; }
        .bg-red { background: var(--danger); }
        .bg-orange { background: var(--warning); }

        .btn-action {
            background: var(--primary);
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="stats-bar">
        <div class="stat-pill"><span style="color: var(--danger)">●</span> 65 Awaited Prices</div>
        <div class="stat-pill"><span style="color: var(--warning)">●</span> 500 Expiring (6 Months)</div>
    </div>

    <div class="toolbar">
        <div>
            <input type="text" class="search-box" placeholder="Search Item, Supplier or PO...">
            <select style="padding: 7px; border-radius: 4px; border: 1px solid var(--border);">
                <option>All Items</option>
                <option>Awaited (-1)</option>
                <option>Expiring < 30 Days</option>
            </select>
        </div>
        <div style="font-size: 0.85rem; color: #666;">
            Showing 1 - 50 of 565 items
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 30%;">Material/Article</th>
                    <th style="width: 20%;">Supplier</th>
                    <th style="width: 15%;">Status</th>
                    <th style="width: 15%;">Current Price</th>
                    <th style="width: 20%;">Impact/Action</th>
                </tr>
            </thead>
            <tbody>
                <tr class="row-critical">
                    <td><strong>Leather Upper - Tan</strong><br><small>ART-8822</small></td>
                    <td>Global Exports</td>
                    <td><span class="badge bg-red">AWAITED</span></td>
                    <td>₹ -1.00</td>
                    <td><strong>24 POs Pending</strong> <button class="btn-action">Update</button></td>
                </tr>
                
                <tr class="row-warning">
                    <td><strong>Piping Tape 5mm</strong><br><small>ACC-004</small></td>
                    <td>Local Thread Co.</td>
                    <td><span class="badge bg-orange">EXPIRES MAY</span></td>
                    <td>₹ 4.50</td>
                    <td><button class="btn-action">Renew</button></td>
                </tr>
                
                </tbody>
        </table>
    </div>

    <div style="margin-top: 10px; text-align: right;">
        <button disabled>Previous</button>
        <button>Next Page</button>
    </div>

</body>
</html>
